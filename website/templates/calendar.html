{% extends "base.html" %}
{% block title %}Calendar{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css" />
<script src="https://unpkg.com/@popperjs/core@2"></script>
<script src="https://unpkg.com/tippy.js@6"></script>

<style>
    .fc {
        background: transparent;
        border: none !important;
    }

    .fc-col-header-cell {
        background-color: transparent;
        border-bottom: 2px solid #dee2e6 !important;
        border-top: none !important;
        border-left: none !important;
        border-right: none !important;
    }

    .fc-td, .fc-daygrid-day {
        border: 1px solid #e9ecef !important;
    }

    .fc-event {
        border: none !important;
        border-radius: 2px !important;
        padding: 4px 6px !important;
        margin: 1px 0 !important;
        box-shadow: none !important;
    }

    .fc-toolbar-title {
        font-weight: 300;
        color: #495057;
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div id="calendar"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    let calendarEl = document.getElementById('calendar');
    if (!calendarEl) {
      return;
    }

    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      height: 'auto',
      contentHeight: 'auto',
      headerToolbar: {
        start: 'prev,next today',
        center: 'title',
        end: ''
      },
      events: '/get-tasks',
      eventContent: function(arg) {
        let cat = arg.event.extendedProps.category;
        let desc = arg.event.extendedProps.description;

        var customHtml = document.createElement('div');
        customHtml.innerHTML = `<strong>${cat}:</strong> ${desc}`;
        customHtml.style.overflow = 'hidden';
        customHtml.style.textOverflow = 'ellipsis';
        customHtml.style.whiteSpace = 'nowrap';

        return { domNodes: [customHtml] };
      },
      eventDidMount: function(info) {
    let cat = info.event.extendedProps.category;
    let desc = info.event.extendedProps.description;
    
    tippy(info.el, {
        content: `<strong>${cat}</strong><br>${desc}`,
        allowHTML: true,
        placement: 'top',
        delay: [0, 0], // 0ms delay to show, 0ms delay to hide
        theme: 'light-border', 
    });
  }
  });

    calendar.render();
  });
</script>
{% endblock %}
