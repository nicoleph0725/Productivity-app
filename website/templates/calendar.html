{% extends "base.html" %}
{% block title %}Calendar{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div id="full-calendar-render"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('full-calendar-render');
    
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      height: 'auto', // Ensures no scrollbar
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth'
      },
      events: '/get-tasks',
      // Removes the default borders from the library for a flatter appearance
      themeSystem: 'standard' 
    });

    calendar.render();
  });
</script>

<style>
    /* 1. Make the calendar background match the page */
    .fc {
        background: transparent;
        border: none !important;
    }

    /* 2. Style the headers and day numbers for a flat design */
    .fc-col-header-cell {
        background-color: transparent;
        border-bottom: 2px solid #dee2e6 !important;
        border-top: none !important;
        border-left: none !important;
        border-right: none !important;
    }

    /* 3. Make grid lines subtle */
    .fc-td, .fc-daygrid-day {
        border: 1px solid #e9ecef !important;
    }

    /* 4. Category Badges (Flat style) */
    .fc-event {
        border: none !important;
        border-radius: 2px !important;
        padding: 4px 6px !important;
        margin: 1px 0 !important;
        box-shadow: none !important;
    }

    /* 5. Title Styling */
    .fc-toolbar-title {
        font-weight: 300; /* Lighter font for a modern flat feel */
        color: #495057;
    }
</style>
{% endblock %}
